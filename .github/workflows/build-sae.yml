name: build-sae-ejabberd

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push to registry.pyramidtip.com/ejabberd"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - "sae/**"
      - ".github/workflows/build-sae.yml"

permissions:
  contents: read

concurrency:
  group: build-sae-ejabberd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.pyramidtip.com
  IMAGE_NAME: ejabberd

jobs:
  build-sae:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.image_tag }}"
          else
            tag="latest"
          fi
          short_sha="${GITHUB_SHA::12}"
          echo "primary=${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${REGISTRY}/${IMAGE_NAME}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry.pyramidtip.com
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.PYRAMIDTIP_REGISTRY_USERNAME }}
          password: ${{ secrets.PYRAMIDTIP_REGISTRY_PASSWORD }}

      - name: Build and push SAE image
        uses: docker/build-push-action@v6
        with:
          context: ./sae
          file: ./sae/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.primary }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha,scope=sae-ejabberd
          cache-to: type=gha,scope=sae-ejabberd,mode=max

      - name: Print image
        shell: bash
        run: |
          echo "Pushed: ${{ steps.image.outputs.primary }}"
          echo "Pushed: ${{ steps.image.outputs.sha }}"
