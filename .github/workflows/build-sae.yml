name: build-sae-ejabberd

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push to registry.pyramidtip.com/ejabberd"
        required: false
        default: "latest"
  push:
    branches: [main]
    paths:
      - "sae/**"
      - ".github/workflows/build-sae.yml"

permissions:
  contents: read

concurrency:
  group: build-sae-ejabberd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: registry.pyramidtip.com
  IMAGE_NAME: ejabberd

jobs:
  build-sae:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: image
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.image_tag }}"
          else
            tag="latest"
          fi
          short_sha="${GITHUB_SHA::12}"
          echo "primary=${REGISTRY}/${IMAGE_NAME}:${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${REGISTRY}/${IMAGE_NAME}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry.pyramidtip.com
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.PYRAMIDTIP_REGISTRY_USERNAME }}
          password: ${{ secrets.PYRAMIDTIP_REGISTRY_PASSWORD }}

      # Harbor behind registry.pyramidtip.com rejects BuildKit direct-push blob HEAD
      # requests in some cases. Use classic docker build + docker push on the
      # native amd64 runner instead. SAE is amd64, so no emulation is needed.
      - name: Build SAE image
        shell: bash
        run: |
          docker build \
            -f ./sae/Dockerfile \
            -t "${{ steps.image.outputs.primary }}" \
            -t "${{ steps.image.outputs.sha }}" \
            ./sae

      - name: Push SAE image
        shell: bash
        run: |
          docker push "${{ steps.image.outputs.primary }}"
          docker push "${{ steps.image.outputs.sha }}"

      - name: Print image
        shell: bash
        run: |
          echo "Pushed: ${{ steps.image.outputs.primary }}"
          echo "Pushed: ${{ steps.image.outputs.sha }}"
